name: Regression Tests

on:
  schedule:
    - cron: '0 2 * * *' # nightly at 2am UTC
  workflow_dispatch: # manual trigger from GitHub UI

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start app server
        run: |
          python3 -m http.server 8080 -d ecommerceTestApp &
          sleep 2
          curl -sf http://localhost:8080/index.html > /dev/null

      - name: Run regression tests
        id: regression
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o' }}
          BASE_URL: http://localhost:8080
          LANGCHAIN_TRACING_V2: 'true'
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_PROJECT: sdet-pipeline
        run: node index.js --mode=regression --ci

      - name: Handle fixes and failures
        if: steps.regression.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/ci-report.sh

      - name: Upload Cypress artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-results
          path: |
            cypress/results/
            ci-results.json
          retention-days: 14
